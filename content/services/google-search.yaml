slug: google-search
title: Google Search
subtitle: The hardest habit to break — and the most worth breaking
category: google
difficulty: 2
what_it_is: >
  Google Search processes 8.5 billion searches per day and holds roughly 92% of the global
  search market. Every search you make contributes to a detailed profile of your interests,
  concerns, health questions, political views, and intentions. Google uses this data for
  advertising across its entire network — not just on Google Search, but on every site
  running Google Ads.
privacy_case: >
  Google's search history is among the most intimate data it holds. People search things
  they wouldn't tell their doctor, their spouse, or their employer. Google keeps this history
  indefinitely unless you manually delete it. In 2023, Google was ordered to pay $5 billion
  in a class action lawsuit over tracking users in "Incognito" mode, which turned out not
  to be as private as users believed.
what_you_lose:
  - Google's search quality, which is genuinely better for some query types
  - Google Maps integration in search results
  - Google Shopping integration
  - Personalized results based on your history and location
honest_assessment: >
  DuckDuckGo and Brave Search have closed the quality gap significantly in the last few years.
  For most queries, they return comparable results. Google remains better for local searches,
  very recent news, and highly specific technical queries. Many people who switch report
  that they barely notice the difference after the first week.
alternatives:
  - name: DuckDuckGo
    url: https://duckduckgo.com
    notes: >
      No tracking. No search history. No profiling. Results are good for most queries.
      !Bangs feature lets you search other sites directly (e.g. !a for Amazon, !w for Wikipedia).
      The default privacy-respecting search choice.
  - name: Brave Search
    url: https://search.brave.com
    notes: >
      Independent search index (not Google or Bing results). Completely private.
      Strong results. Part of the Brave browser ecosystem but works in any browser.
  - name: Startpage
    url: https://startpage.com
    notes: >
      Returns Google results without the tracking. Privacy proxy for Google.
      Good transition option if you want Google quality without Google tracking.
  - name: Kagi
    url: https://kagi.com
    cost: From $5/month
    notes: >
      Paid search — the theory being that if you're not the product, you're the customer.
      Highly customizable. Excellent results. No ads. Growing following among technical users.
  - name: Ecosia
    url: https://ecosia.org
    notes: Uses ad revenue to plant trees. Privacy better than Google. Results powered by Bing.
migration_steps:
  - Change your browser's default search engine to DuckDuckGo or Brave Search
  - Chrome: Settings → Search engine → Change to DuckDuckGo
  - Safari: Settings → Safari → Search Engine → DuckDuckGo
  - Firefox: Settings → Search → Default Search Engine → DuckDuckGo
  - Use it for 2 weeks before evaluating — the habit takes time to break
  - If you find DuckDuckGo results lacking for specific queries, add "!g" to search Google directly (DuckDuckGo bang syntax) rather than switching back entirely
  - Delete your Google Search history at myaccount.google.com/data-and-privacy → Delete activity
