slug: google-maps
title: Google Maps
subtitle: The map that tracks everywhere you've ever been
category: google
difficulty: 2
what_it_is: >
  Google Maps is the world's dominant navigation and local search platform with over
  1 billion monthly users. It covers navigation, public transit, business listings with
  reviews and hours, Street View, indoor maps, and real-time traffic. Google Maps is
  also one of the most comprehensive location tracking systems ever deployed at consumer scale.
privacy_case: >
  With Location History enabled, Google records everywhere you go with timestamps —
  every commute, every doctor's appointment, every late-night errand. This data is stored
  indefinitely and has been used in criminal investigations, including via "geofence warrants"
  where law enforcement requests records of all devices near a specific location at a specific
  time. In 2023, the FTC ordered Google to delete location data it had improperly collected
  and retained. Even with Location History disabled, Google Maps still logs your location
  via Web & App Activity while you're using the app. The gap between "off" and "actually off"
  is significant.
what_you_lose:
  - Google's business data (hours, reviews, photos) which is genuinely the most comprehensive
  - Real-time traffic accuracy (Google has the largest fleet tracking data set)
  - Street View
  - Transit directions in some cities
  - Local search integration with Google Search results
honest_assessment: >
  Apple Maps has closed the gap significantly since its rocky 2012 launch and is now
  excellent for navigation in the US, Canada, UK, and Western Europe. The business listing
  data (hours, reviews, busy times) is still better in Google Maps, but Apple Maps is
  close enough for daily navigation. The migration is lower-friction than most people
  expect — try it for a week and you'll likely find you don't miss Google Maps for most uses.
what_to_delete:
  - Location History — myaccount.google.com/maps/yourdata → Delete all Location History
  - Timeline — delete all your movement data from Google's servers
  - Web & App Activity — turn it off to stop Google from logging Maps usage going forward
alternatives:
  - name: Apple Maps
    url: https://apple.com/maps
    notes: >
      Privacy-first navigation. On-device processing wherever possible. No persistent
      location history sent to Apple. Excellent navigation in US, Canada, UK, Europe, and
      Australia. Includes walking, cycling, transit, and driving. Look Around (Street View
      equivalent). Guides for curated local recommendations. Best choice for iPhone users.
  - name: OsmAnd
    url: https://osmand.net
    cost: Free; OsmAnd+ is $9.99 one-time or free on F-Droid
    notes: >
      Open-source, fully offline maps based on OpenStreetMap. No internet required after
      download. No data collection. Detailed maps including hiking trails, topography,
      and nautical charts. More features than most navigation apps, with a steeper learning
      curve. Best for users who want complete offline capability.
  - name: Organic Maps
    url: https://organicmaps.app
    notes: >
      Free, open-source, beautifully designed offline maps. Based on OpenStreetMap.
      No tracking, no ads, no accounts required. Excellent for hiking, cycling, and travel.
      Simpler interface than OsmAnd. Ideal for international travel without roaming.
  - name: HERE WeGo
    url: https://wego.here.com
    notes: >
      Professional-grade navigation from HERE Technologies (Nokia spinoff, now independent).
      Excellent offline maps. Less surveillance than Google. Good transit coverage.
      Free for personal use.
  - name: Waze
    url: https://waze.com
    notes: >
      Acquired by Google in 2013 — so not a Google exit option, but useful to know.
      Stays in this list for accuracy: Waze is not an alternative to Google Maps.
location_tracking_cleanup:
  - Delete Location History at myaccount.google.com/maps/yourdata → Manage Location History → Delete all
  - Turn off Location History in your Google Account → Data & Privacy → Location History
  - Turn off Web & App Activity to stop logging Maps usage
  - On your phone, revoke Google Maps' location permission entirely after switching
migration_steps:
  - On iPhone, open Settings → Privacy & Security → Location Services → Google Maps → set to Never
  - Set Apple Maps as your default (iOS 14+ supports this in Settings → Default Apps)
  - Use Apple Maps for 1 week for your normal commute and local navigation
  - For travel, download Organic Maps before you go (offline maps, no roaming needed)
  - Delete your Google Maps Location History and Timeline at myaccount.google.com/maps/yourdata
  - Turn off Location History in Google account settings
