slug: android
title: Android & Google Mobile
subtitle: De-Googling your phone without replacing it
category: google
difficulty: 5
what_it_is: >
  Android is Google's mobile operating system, running on roughly 72% of the world's
  smartphones. The "Android" you use from Samsung, OnePlus, or Motorola is heavily
  customized with each manufacturer's additions — and with Google's services baked in
  at a deep level. Google Play Services, Google Services Framework, and the suite of
  Google apps run persistently in the background with elevated permissions, collecting
  data continuously.
privacy_case: >
  Research from Trinity College Dublin found that a stock Android device sends data to
  Google at roughly 8.8MB per day even when sitting idle — compared to 0.52MB for an
  equivalent iOS device. Location data, nearby WiFi networks, app usage, and device
  identifiers all transmit to Google servers regardless of settings. The gap between
  "turned off" and "actually off" is significant on Android in ways it isn't on iOS.
what_you_lose:
  - Google Play Store (largest app ecosystem, 3.5 million+ apps)
  - Google Pay
  - Google Assistant
  - Seamless Google account integration
  - Some banking and streaming apps that require Google Play Protect
honest_assessment: >
  You have two real options: switch to a de-Googled Android (GrapheneOS or CalyxOS on
  compatible hardware) or reduce Google's data collection while staying on stock Android.
  A third option — switching to iPhone — is not recommended here because Apple is its own
  ecosystem you may want to leave (see the Apple guide). The privacy-first path is
  GrapheneOS; the practical path is stock Android with reduced permissions.
note_on_iphone: >
  iPhone is not listed as a recommended alternative here because this site will cover
  leaving Apple's ecosystem as well. iPhone trades Google's surveillance for Apple's
  ecosystem lock-in. For users leaving Google who don't want to enter another closed
  ecosystem, de-Googled Android is the more consistent choice.
alternatives:
  - name: GrapheneOS
    url: https://grapheneos.org
    notes: >
      Privacy-hardened Android, runs on Google Pixel hardware only (Pixel 6 and newer
      recommended). No Google services by default. Excellent security model — frequently
      cited as the most secure mobile OS available. You can install a sandboxed version
      of Google Play if you need specific apps — it runs in an isolated container with
      no special permissions. Full documentation at grapheneos.org. Best for
      privacy-committed users willing to invest setup time.
  - name: CalyxOS
    url: https://calyxos.org
    notes: >
      De-Googled Android with microG — a free, open-source implementation of some
      Google services that allows most Android apps to work. More compatible than
      GrapheneOS for users who need common apps. Runs on Pixel and some other devices.
      Good middle ground between stock Android and full de-Googling.
  - name: /e/ OS (Murena)
    url: https://murena.io
    notes: >
      De-Googled Android with its own app store and cloud services (Murena Cloud).
      Available pre-installed on Murena-brand hardware. More user-friendly than
      GrapheneOS or CalyxOS. Good for non-technical users who want a de-Googled phone
      without significant setup effort.
  - name: Fairphone with /e/ OS
    url: https://shop.fairphone.com
    notes: >
      Ethically sourced, user-repairable hardware available with /e/ OS pre-installed.
      Available in Europe. Combines privacy, repairability, and ethical manufacturing.
      The most principled hardware choice.
reducing_google_on_stock_android:
  intro: "If you're staying on stock Android and not ready for a full switch, these reduce data collection meaningfully:"
  steps:
    - Revoke location permission from Google apps you don't actively use
    - Disable Google's ad ID (Settings → Privacy → Ads → Delete advertising ID)
    - Turn off Google Web & App Activity at myaccount.google.com
    - Replace Google Chrome with Firefox or Brave
    - Replace Google Search with DuckDuckGo or Brave Search
    - Replace Google Messages with Signal
    - Replace Gmail with Proton Mail or Fastmail
    - Use a VPN (Proton VPN free tier or Mullvad)
    - Install F-Droid for open-source apps that don't require Google Play
migration_steps:
  - If switching to GrapheneOS, verify your Pixel model is supported at grapheneos.org/faq
  - Follow GrapheneOS installation guide (web installer is straightforward for Pixel users)
  - Install sandboxed Google Play if you need banking or streaming apps
  - Set up Proton Mail, Proton Drive, and Signal as your core communication/storage stack
  - For contacts and calendar, use a self-hosted solution (Nextcloud) or Proton Calendar
  - For navigation, install OsmAnd or Organic Maps
  - Replace the Google apps you use one at a time, verifying each replacement works before removing the next
