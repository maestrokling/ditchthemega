slug: android
title: Android & Google Mobile
subtitle: The phone in your pocket — and what it reports back
category: google
difficulty: 5
what_it_is: >
  Android is Google's mobile operating system, running on roughly 72% of the world's smartphones.
  A standard Android device with Google services sends data to Google servers constantly —
  location, app usage, contacts, call logs, and more. Google Services Framework, Google Play
  Services, and the suite of Google apps are deeply embedded in most Android phones.
privacy_case: >
  Research has shown that a stock Android device with default settings sends location data to
  Google roughly every 20 minutes, even with location services "off." Google Play Services
  runs persistently in the background with elevated permissions. Your Android phone is, by
  design, a Google data collection device that also makes calls.
what_you_lose:
  - The Google Play Store (largest app ecosystem)
  - Google Pay
  - Google Assistant integration
  - Seamless Google account integration
honest_assessment: >
  This is the most complex migration on this page. Leaving Android fully means either switching
  to iPhone or running a de-Googled Android (like GrapheneOS on a Pixel). Both are significant
  commitments. The more realistic middle ground: use iPhone, or use Android with privacy-respecting
  app choices while minimizing Google service use. Full de-Googled Android is for the technically
  committed only.
alternatives:
  - name: iPhone (iOS)
    url: https://apple.com/iphone
    notes: >
      Apple's privacy practices are significantly better than Google's by design — Apple's
      business model doesn't depend on data collection. App Tracking Transparency requires
      apps to ask permission before tracking. iMessage and FaceTime are end-to-end encrypted.
      The most practical full Android alternative for most people.
  - name: GrapheneOS
    url: https://grapheneos.org
    notes: >
      Privacy-hardened Android, runs on Google Pixel hardware. No Google services.
      Excellent security model. You can install sandboxed Google Play if needed for specific apps.
      For technically committed privacy users. Not for the faint of heart.
  - name: CalyxOS
    url: https://calyxos.org
    notes: >
      De-Googled Android with microG (a free implementation of some Google services).
      More user-friendly than GrapheneOS for people who need some Android app compatibility.
  - name: Fairphone (Android + /e/ OS)
    url: https://shop.fairphone.com
    notes: >
      Ethically sourced, repairable hardware with de-Googled Android (/e/ OS) option.
      Available in Europe. Combines privacy and hardware ethics.
the_privacy_minimum: >
  If you're staying on Android and not ready for a full switch:
  Remove or disable all Google apps you don't use. Use DuckDuckGo instead of Chrome.
  Turn off all Google location history in account settings. Use Signal instead of
  Google Messages. Use a VPN. These don't eliminate Google data collection but reduce it.
migration_steps:
  - If switching to iPhone, use the "Move to iOS" app to transfer contacts, photos, and messages
  - Export Android contacts to a .vcf file before switching
  - Identify which apps you use daily and confirm iOS equivalents exist
  - Sign up for iCloud (5GB free; paid tiers for more)
  - If staying on Android, install GrapheneOS (requires Pixel hardware; detailed instructions at grapheneos.org)
