slug: apple-your-content
title: Your Digital Content
subtitle: What you can take, what you can replace, and what you effectively lose
category: apple
difficulty: 3
intro: >
  You've decided to leave Apple's ecosystem. Before you go, you need to understand what
  happens to the content you've accumulated: the music, movies, books, photos, and apps
  you've purchased, created, or stored within Apple's walls. Some of it is yours and you
  can take it with you. Some of it was never really yours to begin with. This page will
  be honest about the difference.
