slug: what-you-lose
title: What You Actually Lose
subtitle: The honest page no other guide writes
category: meta
what_amazon_does_well: >
  This site exists to help you leave Amazon. But we're not going to pretend that's
  cost-free. Credibility requires honesty. Here's what Amazon genuinely does better
  than its alternatives — at least for now.
real_losses:
  - title: The combination of breadth + speed + easy returns
    detail: >
      No single retailer matches all three. Walmart has breadth and some speed.
      Target has easy returns. But the specific combination — finding a niche item,
      getting it in two days, returning it frictionlessly — that's Amazon's moat.
      Individual alternatives cover individual categories. None covers everything.
  - title: Niche and obscure items
    detail: >
      Amazon's third-party marketplace includes items you simply cannot find elsewhere —
      replacement parts, specialty tools, obscure electronics, specific consumables.
      For truly niche purchases, Amazon may remain your only practical option for a while.
      That's okay. Reducing dependency doesn't mean elimination.
  - title: FBA logistics (for sellers)
    detail: >
      For Amazon sellers, FBA is genuinely excellent infrastructure. The combination of
      Prime badge, fast shipping, and Amazon's fulfillment network is hard to replicate
      independently. Alternatives cost more and require more operational complexity.
  - title: Amazon Business (B2B)
    detail: >
      Amazon Business has deep procurement integrations, tax-exempt purchasing, and
      approval workflows that no competitor has fully replicated. For businesses with
      Amazon Business accounts, migration is more complex than consumer accounts.
  - title: Same-day delivery in major metros
    detail: >
      In major cities, Amazon's same-day and next-day delivery is genuinely faster than
      alternatives. Instacart and Target same-day exist, but Amazon's coverage is broader.
  - title: Price discovery
    detail: >
      Amazon is genuinely useful as a price reference, even if you don't buy there.
      Knowing an item's Amazon price helps you evaluate deals elsewhere.
the_honest_frame: >
  The goal isn't to use Amazon zero times, forever. For most people, the goal is:
  stop using Amazon by default. Shop intentionally. Know where your alternatives are.
  Reduce the data footprint. Leave the services that raise privacy concerns (Alexa, Ring).
  The sites, companies, and communities that aren't Amazon benefit every time you buy
  from them instead. That adds up — even if it's not a complete break.
what_changes_over_time: >
  Amazon's advantages are real but not permanent. Walmart+ is improving. Shopify powers
  more direct-to-brand purchasing than ever. The open-source smart home ecosystem
  (Home Assistant, Matter standard) is maturing. Kobo is excellent. Five years ago,
  leaving Amazon was harder. Five years from now, it will be easier. The alternatives
  listed on this site are better than they've ever been.
