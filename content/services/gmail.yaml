slug: gmail
title: Gmail
subtitle: Leaving Google's email — and the inbox it's been reading
category: google
difficulty: 3
what_it_is: >
  Gmail is Google's free email service with 1.8 billion users. It offers 15GB free storage
  shared with Drive and Photos, excellent spam filtering, and deep integration with Google's
  other services. The tradeoff: your inbox is the master key to your entire digital life.
  Every account recovery, every password reset, every purchase confirmation flows through it.
  Who holds that key matters.
privacy_case: >
  Google's terms permit using email content for product improvement and to power features
  like Smart Reply and automatic calendar event creation. More significantly, Gmail is deeply
  integrated into Google's advertising profile — purchase confirmations, travel itineraries,
  subscription renewals, and delivery notifications all contribute to what Google knows about
  you. In 2022, Google disclosed it had given government entities access to Gmail data in
  response to legal demands over 11,000 times. Your inbox is not private.
what_you_lose:
  - 15GB free storage shared across Gmail, Drive, and Photos
  - Best-in-class spam filtering (genuinely excellent)
  - Google Workspace integration (Calendar, Meet, Drive, Docs)
  - Smart features (Smart Reply, Smart Compose, automatic event creation)
  - The familiarity of an interface most people have used for over a decade
honest_assessment: >
  Email migration is real work, and it's not a weekend project. Your address is on
  hundreds of accounts. Changing it means updating financial institutions, government
  accounts, subscriptions, contacts, and everything else — a process that takes weeks
  to months. Keep your Gmail address accessible for a long time after migrating; you'll
  keep getting mail there for years. The right approach is gradual migration, not a
  hard cutover.
the_key_insight: >
  Your email is the recovery address for everything else. Before migrating, audit which
  accounts use your Gmail for login or recovery: financial accounts, government accounts,
  work accounts, anything important. Change those to your new address first, before
  anything else. Losing access to the recovery email for your bank account is a serious problem.
data_to_export:
  - Google Takeout (takeout.google.com) → select Mail → export as .mbox files
  - Export Contacts via contacts.google.com → Export → Google CSV
  - Download Calendar events via Google Takeout → select Calendar → export as .ical
  - Note which services use your Gmail for 2FA/recovery before migrating
migration_strategy:
  - Phase 1 (week 1) — Create new email account and update critical accounts (bank, financial, government, healthcare)
  - Phase 2 (weeks 2-4) — Set up Gmail forwarding to your new address and add an auto-reply noting the change
  - Phase 3 (months 1-3) — Update remaining accounts as you encounter them in daily use
  - Phase 4 (month 3-6) — Monitor forwarded mail; only deactivate Gmail when you stop receiving important mail there
  - Final step — Export all mail via Takeout, delete account at myaccount.google.com
alternatives:
  - name: Proton Mail
    url: https://proton.me/mail
    cost: Free up to 1GB; from $3.99/month for 15GB+
    notes: >
      End-to-end encrypted by default. Based in Switzerland under Swiss privacy law.
      Zero-knowledge architecture — Proton cannot read your email. ProtonVPN, ProtonDrive,
      ProtonPass, and ProtonCalendar available as a complete ecosystem replacement.
      Custom domains supported. Best overall privacy-first Gmail replacement.
  - name: Fastmail
    url: https://fastmail.com
    cost: From $3/month
    notes: >
      Fast, reliable, excellent interface. Not end-to-end encrypted by default, but
      no advertising and strong privacy commitments. Best UX of any Gmail alternative —
      feels modern without feeling like Google. Custom domains, solid iOS/Android apps.
      Australian company; strong privacy practices.
  - name: Tutanota
    url: https://tutanota.com
    cost: Free tier available; from €1/month
    notes: >
      End-to-end encrypted. Open source. German-based (EU privacy law). Simpler
      than Proton. Good for people who want encryption without complexity. Calendar included.
  - name: Hey
    url: https://hey.com
    cost: $99/year
    notes: >
      Opinionated email redesign from Basecamp — the Imbox, the Feed, the Paper Trail.
      Forces you to screen senders before their emails arrive. No ads, no tracking.
      Best choice for people who want to rethink how email works, not just who hosts it.
  - name: iCloud Mail
    url: https://icloud.com/mail
    cost: Free 5GB with Apple ID
    notes: >
      Solid choice for Apple ecosystem users. Apple's business model doesn't depend
      on reading your email. Not end-to-end encrypted, but privacy practices
      significantly better than Google's. Hide My Email feature creates disposable
      addresses for signups. Note — covered in the Apple guide for users leaving Apple.
migration_steps:
  - Create your new email account first (Proton Mail or Fastmail recommended)
  - Enable Gmail forwarding to your new address (Gmail → Settings → Forwarding)
  - Update your five most critical accounts (bank, financial, government ID, healthcare, phone carrier) to the new address immediately
  - Add a Gmail vacation auto-reply noting your new address for contacts
  - Export all Gmail via Google Takeout — keep the archive, you'll want it
  - Over the next 60–90 days, update accounts as emails arrive at Gmail
  - After 3–6 months, when you stop seeing important mail, delete your Google account
